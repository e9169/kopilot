coverage:
  precision: 2
  round: down
  range: "50...100"
  status:
    project:
      default:
        target: auto
        threshold: 5%
    patch:
      default:
        # Patch coverage is informational only.
        # Some code paths (e.g. Run, switchToModel) require a live Copilot SDK
        # session and cannot be unit-tested, so they will always show 0% patch
        # coverage on dependency-bump PRs that touch those lines.
        informational: true
