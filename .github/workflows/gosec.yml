name: Gosec

on:
  push:
    branches: ["main", "develop"]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'website/**'
      - 'examples/**'
      - '.github/instructions/**'
      - '.github/prompts/**'
      - '.github/skills/**'
  pull_request:
    branches: ["main"]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'website/**'
      - 'examples/**'
      - '.github/instructions/**'
      - '.github/prompts/**'
      - '.github/skills/**'

permissions:
  contents: read
  security-events: write

jobs:
  gosec:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          # Fail on high and critical severity findings; medium and below are reported but non-blocking.
          gosec -severity high -confidence medium -nosec ./...
