name: Gosec

on:
  push:
    branches: ["main", "develop"]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'website/**'
      - 'examples/**'
      - '.github/instructions/**'
      - '.github/prompts/**'
      - '.github/skills/**'
  pull_request:
    branches: ["main"]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'website/**'
      - 'examples/**'
      - '.github/instructions/**'
      - '.github/prompts/**'
      - '.github/skills/**'

permissions:
  contents: read
  security-events: write

jobs:
  gosec:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Run gosec
        uses: securego/gosec@6decf96c3d272d5a8bbdcf9fddb5789d0be16a8d # v2.22.4
        with:
          # Fail on high and critical severity findings; medium and below are reported but non-blocking.
          args: '-severity high -confidence medium ./...'
